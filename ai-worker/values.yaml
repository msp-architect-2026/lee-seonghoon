replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: 192.168.10.248:5050/root/color-ai-ai-worker
  tag: "latest"
  pullPolicy: Always

imagePullSecrets:
  - name: gitlab-registry-secret

serviceAccount:
  create: false
  name: ""
  annotations: {}
  automount: false

service:
  type: ClusterIP
  port: 8001

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []

httpRoute:
  enabled: false
  parentRefs: []
  hostnames: []
  rules: []
  annotations: {}

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "3Gi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

nodeSelector:
  workload: ai-inference

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "ai-inference"
    effect: "NoSchedule"

affinity: {}

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

livenessProbe: {}
readinessProbe: {}

volumes: []
volumeMounts: []

env:
  ONNX_MODEL_PATH: "/app/models/personal_color_model.onnx"
  ENVIRONMENT: "production"
